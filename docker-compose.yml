version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: browserops-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: browserops
      POSTGRES_PASSWORD: browserops_password
      POSTGRES_DB: browserops_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: browserops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
